apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-jiangyunfeng-deploy
  labels:
    app: jiangyunfeng
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: 2
  selector:
    matchLabels:
      app: jiangyunfeng
  template:
    metadata:
      labels:
        app: jiangyunfeng
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: springboot-jiangyunfeng-container
        image: springboot:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        
        # 从Secret 注入数据库账号密码
        env:
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
              
        # 挂载 ConfigMap 配置文件
        volumeMounts:
        - name: config-volume
          mountPath: /jiangyunfeng/config
          
        # 健康检查（用根路径，不用加Actuator）
        startupProbe:
          httpGet:
            path: /
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 3
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
      
      # 声明 ConfigMap 卷
      volumes:
      - name: config-volume
        configMap:
          name: springboot-config
          
          
apiVersion: v1
kind: Service
metadata:
  name: springboot-jiangyunfeng-svc  # Service名字
spec:
  type: NodePort
  selector:
    app: jiangyunfeng     # 必须和Deployment标签一致
  ports:
  - port: 8080
    targetPort: 8080